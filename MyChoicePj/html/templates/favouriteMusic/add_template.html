<form id="add-form" method="post" @submit.prevent="addFavouriteMusic">
  <table class="no-search">
    <tbody>
      <tr>
        <td class="set-w-130px">
          <strong>Tên bài hát</strong>
        </td>
        <td>
          <input type="text" v-model="formAdd.title" name="title" value="">
        </td>
      </tr>
      <tr>
        <td>
          <strong>Nhạc sĩ</strong>
        </td>
        <td>
          <input type="text" v-model="formAdd.artist" name="artist" value="">
        </td>
      </tr>
      <tr>
        <td>
          <strong>Album</strong>
        </td>
        <td>
          <input type="text" v-model="formAdd.album" name="album" value="">
        </td>
      </tr>
      <tr>
        <td>
          <strong>Ngày phát hành</strong>
        </td>
        <td>
          <input type="datetime-local" v-model="formAdd.release_at" name="release_at" value="">
        </td>
      </tr>
      <tr>
        <td colspan="2" class="set-text-c">
          <button class="back-btn" type="button" @click="handleClickBack">
            <i class="fa fa-arrow-left"></i> Trở về
          </button>
          <button class="update-btn" type="submit">
            <i class="fa fa-tasks"></i> Thêm mới
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  <!-- component confirm Dialog -->
  <message-error-success ref="messageErrorSuccess"></message-error-success>
</form>
